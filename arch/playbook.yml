---
- name: Provision Arch VM as a coding agent
  hosts: all
  become: true

  vars:
    claude_json_settings:
      editorMode: vim

  tasks:
    - name: Install packages
      community.general.pacman:
        name:
          - base-devel
          - git
          - unzip
          - less
          - shellcheck
          - bind-tools
          - man-db
          - man-pages
        state: present
        update_cache: true
        extra_args: --needed

    - name: Clone yay-bin from AUR
      ansible.builtin.git:
        repo: https://aur.archlinux.org/yay-bin.git
        dest: /home/migrant/yay-build
        version: master
      become: true
      become_user: migrant

    - name: Build and install yay
      # makepkg must run as a non-root user; the migrant user's passwordless
      # sudo allows the install step (-i) to escalate without a prompt.
      ansible.builtin.command:
        cmd: makepkg -si --noconfirm
        chdir: /home/migrant/yay-build
        creates: /usr/bin/yay
      become: true
      become_user: migrant

    - name: Download claude-code installer
      ansible.builtin.get_url:
        url: https://claude.ai/install.sh
        dest: /tmp/claude-install.sh
        mode: "0755"
        force: false

    - name: Install claude-code
      ansible.builtin.command:
        cmd: /tmp/claude-install.sh
        creates: /home/migrant/.local/bin/claude
      become: true
      become_user: migrant
      environment:
        HOME: /home/migrant

    - name: Ensure ~/.claude directory exists
      ansible.builtin.file:
        path: /home/migrant/.claude
        state: directory
        mode: "0700"
      become: true
      become_user: migrant

    # This is an example of how to push a Claude Code settings file from the
    # host to the VM at provision time. If the source file does not exist on
    # the host, the task will error but Ansible will continue regardless.
    - name: Copy claude settings to VM
      ansible.builtin.copy:
        src: ~/library/conf/claude/settings.json
        dest: /home/migrant/.claude/settings.json
        mode: "0600"
      become: true
      become_user: migrant
      ignore_errors: true # noqa: ignore-errors

    - name: Copy global CLAUDE.md to VM
      ansible.builtin.copy:
        src: ~/library/conf/claude/CLAUDE.md
        dest: /home/migrant/.claude/CLAUDE.md
        mode: "0600"
      become: true
      become_user: migrant
      ignore_errors: true # noqa: ignore-errors

    - name: Configure ~/.claude.json settings
      ansible.builtin.shell: |
        python3 - <<'EOF'
        import json, os
        path = os.path.expanduser('~/.claude.json')
        data = json.load(open(path)) if os.path.exists(path) else {}
        updates = json.loads(os.environ['CLAUDE_JSON_SETTINGS'])
        if all(data.get(k) == v for k, v in updates.items()):
            print('unchanged')
        else:
            data.update(updates)
            json.dump(data, open(path, 'w'), indent=2)
            print('changed')
        EOF
      environment:
        CLAUDE_JSON_SETTINGS: "{{ claude_json_settings | to_json }}"
      register: claude_json_result
      changed_when: "claude_json_result.stdout == 'changed'"
      become: true
      become_user: migrant

    - name: Download uv installer
      ansible.builtin.get_url:
        url: https://astral.sh/uv/install.sh
        dest: /tmp/uv-install.sh
        mode: "0755"
        force: false

    - name: Install uv
      ansible.builtin.command:
        cmd: /tmp/uv-install.sh
        creates: /usr/local/bin/uv
      environment:
        UV_INSTALL_DIR: /usr/local/bin

    - name: Download opencode installer
      ansible.builtin.get_url:
        url: https://opencode.ai/install
        dest: /tmp/opencode-install.sh
        mode: "0755"
        force: false

    - name: Install opencode
      ansible.builtin.command:
        cmd: /tmp/opencode-install.sh --no-modify-path
        creates: /home/migrant/.opencode/bin/opencode
      become: true
      become_user: migrant
      environment:
        HOME: /home/migrant

    - name: Configure shell environment system-wide
      ansible.builtin.copy:
        content: |
          export PATH="$HOME/.local/bin:$HOME/.opencode/bin:$PATH"
          [[ -f "$HOME/.bash_aliases" ]] && source "$HOME/.bash_aliases"
        dest: /etc/profile.d/migrant.sh
        mode: "0644"

    - name: Copy bash aliases to VM
      ansible.builtin.copy:
        content: |
          alias c="cd ~/workspace && claude --dangerously-skip-permissions"
          alias cc="claude --dangerously-skip-permissions"
          alias ccc="claude --dangerously-skip-permissions --continue"
          alias ccr="claude --dangerously-skip-permissions --resume"
        dest: /home/migrant/.bash_aliases
        mode: "0644"
      become: true
      become_user: migrant

    - name: Mask filesystem maintenance timers (ephemeral qcow2 VM gets no benefit)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - man-db.timer
        - e2scrub_all.timer
        - fstrim.timer

    # KVM guests use kvm-clock, a paravirtualized clock continuously fed by the
    # host. The guest clock is accurate from the first kernel instruction and
    # stays synchronized without NTP. Masking timesyncd (redundant) also
    # prevents time-wait-sync from hanging at boot waiting for a sync signal
    # that would never arrive, which would otherwise delay sshd by ~35 seconds
    # via the pacman-init.service → sshd.service ordering chain.
    - name: Mask NTP services (kvm-clock keeps the guest synchronized via the host)
      ansible.builtin.systemd:
        name: "{{ item }}"
        masked: true
      loop:
        - systemd-timesyncd.service
        - systemd-time-wait-sync.service

    # cloud-init's services run checks on every boot even when there is nothing
    # to do. This sentinel file tells cloud-init to skip all module execution,
    # saving several seconds on every subsequent start.
    - name: Disable cloud-init on subsequent boots
      ansible.builtin.file:
        path: /etc/cloud/cloud-init.disabled
        state: touch
        mode: "0644"
